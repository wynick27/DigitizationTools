name: Build Executable

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 推荐使用稳定的 Python 版本
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyMuPDF requests pykakasi
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "OcrProofreadingTool" --collect-data "pykakasi" "ocr_proofreading.py"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OcrProofreadingTool-Windows
        path: dist/OcrProofreadingTool/
