name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # 只有推送 v 开头的 tag 时才会发布 Release (如 v1.0.0)
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write # 允许 GITHUB_TOKEN 创建 Release 并在其中包括文件

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 推荐使用稳定的 Python 版本
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt6 PyMuPDF requests pykakasi chrome-lens-py
        
    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "OcrProofreadingTool" --collect-data "pykakasi" "ocr_proofreading.py"
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OcrProofreadingTool-Windows
        path: dist/OcrProofreadingTool/

    - name: Zip for Release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        Compress-Archive -Path dist\OcrProofreadingTool -DestinationPath OcrProofreadingTool-Windows.zip
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: OcrProofreadingTool-Windows.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
